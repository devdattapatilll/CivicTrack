
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Number 270 Pothole Detection Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            color: #333;
        }
        .header {
            background-color: #0055FF;
            color: white;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .dashboard-container {
            max-width: 1280px;
            margin: 30px auto;
            padding: 20px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .video-container {
            flex: 2;
            min-width: 300px;
        }
        .video-feed {
            width: 100%;
            border: 3px solid #0055FF;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .stats-panel {
            flex: 1;
            min-width: 300px;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 1px solid #0055FF;
        }
        .stats-panel h2 {
            color: #0055FF;
            margin: 0 0 15px 0;
            font-size: 1.5rem;
            border-bottom: 2px solid #0055FF;
            padding-bottom: 5px;
        }
        .stats-item {
            margin: 10px 0;
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: 5px;
            font-size: 1rem;
        }
        .stats-item strong {
            color: #333;
        }
        .upload-panel {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e6eefc;
        }
        .dropzone {
            border: 2px dashed #8ab0ff;
            border-radius: 10px;
            padding: 14px;
            background: #f7faff;
            cursor: pointer;
            user-select: none;
        }
        .dropzone.dragover {
            border-color: #0055FF;
            background: #eef4ff;
        }
        .dropzone small {
            color: #5b6b85;
            display: block;
            margin-top: 6px;
        }
        .upload-status {
            margin-top: 10px;
            font-size: 0.95rem;
            color: #333;
            min-height: 1.2em;
        }
        .upload-status.error {
            color: #b00020;
        }
        .footer {
            background-color: #0055FF;
            color: white;
            padding: 1rem;
            text-align: center;
            position: fixed;
            bottom: 0;
            width: 100%;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
  
    <div class="header">
        <h1>Group Number 270 Pothole Detection System</h1>
    </div>


    <div class="dashboard-container">
      
        <div class="stats-panel">
            <h2>Analysis Statistics</h2>
            <div class="stats-item">
                <strong>Model:</strong> tempModel
            </div>
            <div class="stats-item">
                <strong>Status:</strong> Running
            </div>
            <div class="stats-item">
                <strong>Frame Rate:</strong> Calculating...
            </div>
            <div class="stats-item">
                <strong>Detections:</strong> <span id="detection-count">0</span>
            </div>
            <div class="stats-item">
                <strong>Confidence Threshold:</strong> 0.7
            </div>

            <div class="upload-panel">
                <div class="stats-item">
                    <strong>Upload Image</strong>
                </div>
                <div id="dropzone" class="dropzone" tabindex="0" role="button" aria-label="Upload image">
                    Drag & drop an image here, or click to choose
                    <small>Supported: JPG, PNG, WEBP, BMP (max 10MB)</small>
                </div>
                <input id="file-input" type="file" accept="image/*" style="display:none" />
                <div id="upload-status" class="upload-status"></div>
            </div>
        </div>
    </div>

    
    <div class="footer">
        <p>Group Number 270 </p>
       
    </div>

    <script>
        function updateDetectionCount() {
            fetch('/detection_count')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('detection-count').innerText = data.detections;
                })
                .catch(error => console.error('Error fetching detection count:', error));
        }

        function setStatus(message, isError=false) {
            const el = document.getElementById('upload-status');
            el.textContent = message;
            el.classList.toggle('error', !!isError);
        }


        async function uploadFile(file) {
            if (!file) return;
            const formData = new FormData();
            formData.append('image', file);

            setStatus('Uploading...');
            try {
                const res = await fetch('/upload', { method: 'POST', body: formData });
                const data = await res.json().catch(() => ({}));
                if (!res.ok || !data.ok) {
                    setStatus(data.error || 'Upload failed', true);
                    return;
                }
                setStatus('Uploaded. Running detection...');
                
                updateDetectionCount();
                setTimeout(() => setStatus(''), 2500);
            } catch (e) {
                setStatus('Upload error: ' + e, true);
            }
        }

        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('file-input');

        dropzone.addEventListener('click', () => fileInput.click());
        dropzone.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') fileInput.click();
        });
        fileInput.addEventListener('change', () => uploadFile(fileInput.files[0]));

        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('dragover');
        });
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            const file = e.dataTransfer.files && e.dataTransfer.files[0];
            uploadFile(file);
        });

       
        setInterval(updateDetectionCount, 1000);

        
        updateDetectionCount();
    </script>
</body>
</html>
